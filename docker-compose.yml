services:
  # PHP Application (Laravel Backend)
  backend:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: narzin_backend
    restart: unless-stopped
    working_dir: /var/www/narzinapp-main
    volumes:
      - ./narzinapp-main:/var/www/narzinapp-main
    networks:
      - narzin_network
    depends_on:
      - db
      - redis

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: narzin_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./narzinapp-main:/var/www/narzinapp-main
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - narzin_network
    depends_on:
      - backend

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: narzin_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: narzin
      POSTGRES_USER: narzin_user
      POSTGRES_PASSWORD: narzin_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - narzin_network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: narzin_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - narzin_network

  # React Frontend (Vite)
  frontend:
    image: node:20-alpine
    container_name: narzin_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./narzin-main:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    networks:
      - narzin_network
    depends_on:
      - backend

networks:
  narzin_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
